<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>archview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #080B11; --bg2: #06080d; --panel: #0a101c; --panel2: #0e1626;
    --card: #0F1724; --line: #ffffff14; --line2: #ffffff0e;
    --text: #EAF1FA; --text2: #D7E2F2; --muted: #64748B; --dim: #e6edf680;
    --endpoint: #22D3EE; --controller: #3B82F6; --service: #6366F1;
    --port: #94A3B8; --repository: #A855F7; --other: #64748B;
    --sans: 'IBM Plex Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.45 var(--sans); -webkit-font-smoothing: antialiased; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header { display: flex; align-items: center; gap: 14px; padding: 10px 16px; flex: none;
    background: linear-gradient(180deg, var(--panel2), var(--panel)); border-bottom: 1px solid var(--line2); }
  header .brand { display: inline-flex; align-items: center; gap: 10px; }
  header .brand b { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  header .tag { font-family: var(--mono); font-size: 11px; color: var(--muted);
    border: 1px solid var(--line2); border-radius: 6px; padding: 2px 7px; }
  header .module { color: var(--muted); font-family: var(--mono); font-size: 12px; }
  header .spacer { flex: 1; }
  .legend { display: flex; gap: 12px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 11.5px; }
  .legend i { width: 8px; height: 8px; border-radius: 99px; display: inline-block; }
  .counts { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 11.5px; font-family: var(--mono); }

  main { position: relative; flex: 1; overflow: hidden; cursor: grab;
    background:
      radial-gradient(120% 80% at 50% -10%, #0c1422 0%, transparent 60%),
      var(--bg); }
  main.panning { cursor: grabbing; }
  svg#svg { width: 100%; height: 100%; display: block; }

  .toolbar { position: absolute; top: 14px; right: 14px; display: flex; gap: 4px;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 12px;
    padding: 4px; box-shadow: 0 10px 30px -10px #000a; backdrop-filter: blur(8px); }
  .toolbar button { appearance: none; border: 0; background: transparent; color: var(--text2);
    font: 500 12px var(--mono); padding: 6px 11px; border-radius: 8px; cursor: pointer; }
  .toolbar button:hover { background: #ffffff12; color: #fff; }
  .toolbar .sep { width: 1px; background: var(--line); margin: 4px 2px; }

  .lane .lane-bg { fill: #ffffff03; stroke: var(--line2); stroke-width: 1; }
  .lane { cursor: grab; }
  .lane.dragging { cursor: grabbing; }
  .lane:hover .lane-bg { stroke: #ffffff1f; }
  .lane .lname { fill: var(--text); font: 600 13px var(--sans); }
  .lane:hover .lname { fill: #fff; }
  .lane .tri { fill: var(--dim); font-size: 10px; }
  .lane .grip { fill: var(--muted); font-size: 12px; letter-spacing: 1px; }
  .lane .cnt { fill: var(--muted); font: 600 10px var(--mono); }

  .col-head { fill: #e6edf64d; font: 600 11px var(--mono); letter-spacing: 2.5px; }

  .node { cursor: grab; }
  .node.dragging { cursor: grabbing; }
  .node .card { stroke-width: 1; transition: stroke .15s; }
  .node .ident { font: 600 13.5px var(--sans); fill: var(--text); pointer-events: none; }
  .node .sub { font: 500 10.5px var(--mono); fill: var(--muted); pointer-events: none; }
  .node .route { font: 600 14px var(--sans); fill: var(--text); pointer-events: none; }
  .node .mtxt { font: 600 10px var(--mono); letter-spacing: .4px; pointer-events: none; }
  .node .ptag { font: 600 9.5px var(--mono); letter-spacing: 1px; fill: var(--port); text-transform: uppercase; pointer-events: none; }
  .glowdot { stroke: none; }

  .edge { fill: none; }
  .arrow { stroke: none; }
  .dim { opacity: .28 !important; }

  footer { flex: none; display: flex; align-items: center; gap: 14px; padding: 0 16px; min-height: 34px;
    background: linear-gradient(180deg, var(--panel), var(--panel2)); border-top: 1px solid var(--line2);
    font-family: var(--mono); font-size: 11.5px; color: var(--muted);
    white-space: nowrap; overflow: hidden; }
  footer .s-left { color: var(--text2); font-weight: 600; }
  footer .s-mid { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  footer .s-loc { color: var(--muted); }
  .empty { position: absolute; inset: 0; display: none; place-items: center; color: var(--muted); }
  .empty.show { display: grid; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="brand">
      <svg width="24" height="24" viewBox="0 0 48 48" aria-hidden>
        <rect width="48" height="48" rx="11" fill="#0d1320" />
        <g transform="translate(24 24) scale(0.92) translate(-24 -24)">
          <path d="M24 9 L10.5 39.5 M24 9 L37.5 39.5 M15.9 27.4 L32.1 27.4"
            stroke="#5B9BFF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <circle cx="24" cy="9" r="4" fill="#3B82F6" />
          <circle cx="10.5" cy="39.5" r="4" fill="#22D3EE" />
          <circle cx="37.5" cy="39.5" r="4" fill="#A855F7" />
        </g>
      </svg>
      <b>archview</b>
    </span>
    <span class="tag">/graph</span>
    <span class="module" id="module"></span>
    <span class="spacer"></span>
    <span class="legend">
      <span><i style="background:var(--endpoint)"></i>endpoint</span>
      <span><i style="background:var(--controller)"></i>controller</span>
      <span><i style="background:var(--service)"></i>service</span>
      <span><i style="background:var(--port)"></i>port</span>
      <span><i style="background:var(--repository)"></i>repository</span>
      <span><i style="background:#F87171"></i>violation</span>
      <span><i style="background:#34D399"></i>rpc (cross-service)</span>
    </span>
    <span class="counts" id="counts"></span>
  </header>
  <main id="main">
    <svg id="svg"><g id="viewport"><g id="content"></g></g></svg>
    <div class="toolbar" id="toolbar">
      <button data-act="fit">Fit</button>
      <button data-act="reset" title="reset saved layout">Reset</button>
      <button data-act="expand">Expand all</button>
      <button data-act="collapse">Collapse all</button>
      <span class="sep"></span>
      <button data-act="zoomin">+</button>
      <button data-act="zoomout">−</button>
    </div>
    <div class="empty" id="empty">no graph data — no endpoints or layered functions detected</div>
  </main>
  <footer id="footer">
    <span class="s-left" id="s-left">archview</span>
    <span class="s-mid" id="s-mid">drag a lane to move a module · drag a node · click a lane header to collapse · click a node to open in editor</span>
    <span class="s-loc" id="s-loc"></span>
  </footer>
</div>
<script>
const BASE = "__BASE__";
const LAYER_ORDER = ["endpoint","controller","service","port","repository","other"];
const COLOR = { endpoint:"#22D3EE", controller:"#3B82F6", service:"#6366F1", port:"#94A3B8", repository:"#A855F7", other:"#64748B" };
const NS = "http://www.w3.org/2000/svg";
const COLW = 420, NODEW = 320, NODEH = 80, VGAP = 18, COLPAD = 30, LANE_HEAD = 42, LANE_GAP = 30, LEFT = 30, TOP = 26;

const el = (tag, attrs={}, kids=[]) => {
  const n = document.createElementNS(NS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  for (const c of kids) n.appendChild(c);
  return n;
};
const txt = s => document.createTextNode(s);
const esc = s => (s || "").replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
const short = f => { if (!f) return ""; const s = f.split("/"); return s.slice(-3).join("/"); };
const shortPkg = p => { if (!p) return ""; const s = p.split("/"); return s.slice(-2).join("/"); };
const off = (m, k) => m[k] || { dx: 0, dy: 0 };
const rgba = (hex, a) => { const n = parseInt(hex.slice(1), 16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; };
const methodColor = m => m === "POST" ? "#5B9BFF" : m === "DELETE" ? "#F87171" : m === "PUT" || m === "PATCH" ? "#FBBF24" : m === "WS" ? "#A78BFA" : m === "RPC" ? "#34D399" : "#2DD4BF";

let G, nodeById = {}, modulesAll = [];
const collapsed = new Set();
const nodeDelta = {}, laneOffset = {};
let Pbase = {}, P = {};
let adj = {}, nodeEls = {}, edgeEls = [], laneEls = {};
let view = { x: 0, y: 0, w: 1000, h: 700 }, viewInit = false, lastSize = { W: 1000, H: 700 };

const content = document.getElementById("content");
const svg = document.getElementById("svg");
const mainEl = document.getElementById("main");

async function main() {
  const res = await fetch(BASE + "/data");
  G = await res.json();
  document.getElementById("module").textContent = G.module || "";
  const vcount = G.edges.filter(e => e.violation).length;
  document.getElementById("counts").textContent =
    `${G.nodes.length} nodes · ${G.edges.length} edges` + (vcount ? ` · ⚠ ${vcount} issue${vcount > 1 ? "s" : ""}` : "");
  if (vcount) document.getElementById("counts").style.color = "#F87171";
  for (const n of G.nodes) nodeById[n.id] = n;
  loadLayout();
  if (!G.nodes.length) { document.getElementById("empty").classList.add("show"); return; }
  modulesAll = [...new Set(G.nodes.map(moduleName))].sort();
  setupControls();
  render();
}

const moduleName = n => n.module || "(root)";

function columns() {
  const present = new Set();
  for (const n of G.nodes) present.add(n.layer);
  if (collapsed.size) present.add("controller");
  const cols = LAYER_ORDER.filter(l => present.has(l));
  const x = {}; cols.forEach((l, i) => x[l] = LEFT + COLPAD + i * COLW);
  return { cols, x };
}

function computeLayout() {
  const { cols, x } = columns();
  const boxCol = x.controller != null ? "controller" : (cols.find(c => c !== "endpoint") || cols[0]);
  const modules = [...new Set(G.nodes.map(moduleName))].sort();
  const pos = {}, lanes = [];
  let y = TOP + 20;

  for (const m of modules) {
    const laneNodes = G.nodes.filter(n => moduleName(n) === m);
    const isCol = collapsed.has(m);
    const colGroups = {};
    const push = (layer, e) => (colGroups[layer] = colGroups[layer] || []).push(e);
    for (const n of laneNodes) {
      if (n.kind === "endpoint") { push("endpoint", { id: n.id, node: n }); continue; }
      if (isCol) continue;
      push(n.layer, { id: n.id, node: n });
    }
    if (isCol) {
      const hidden = laneNodes.filter(n => n.kind !== "endpoint");
      push(boxCol, { id: "mod:" + m, box: { module: m, count: hidden.length } });
    }
    let rows = 1;
    for (const c in colGroups) rows = Math.max(rows, colGroups[c].length);
    const nodeTop = y + LANE_HEAD;
    for (const c in colGroups) colGroups[c].forEach((e, i) => {
      pos[e.id] = { x: x[c], y: nodeTop + i * (NODEH + VGAP), node: e.node, box: e.box, module: m };
    });
    const laneH = LANE_HEAD + rows * (NODEH + VGAP) - VGAP + 16;
    // Lane box wraps only the columns this module actually uses — both left and
    // right — so a module living in the right-hand columns (e.g. an adapter that
    // only has repository nodes) gets a compact box there instead of a
    // full-width band starting from the left.
    let minColX = Infinity, maxColX = -Infinity;
    for (const c in colGroups) {
      minColX = Math.min(minColX, x[c]);
      maxColX = Math.max(maxColX, x[c] + NODEW);
    }
    if (!isFinite(minColX)) { minColX = LEFT + COLPAD; maxColX = minColX + NODEW; }
    const laneX = minColX - 14;
    const laneW = maxColX + 14 - laneX;
    lanes.push({ module: m, y, h: laneH, x: laneX, w: laneW, collapsed: isCol, count: laneNodes.filter(n => n.kind !== "endpoint").length });
    y += laneH + LANE_GAP;
  }
  const W = LEFT + COLPAD + cols.length * COLW + 24, H = y + 24;
  return { cols, x, pos, lanes, edges: remapEdges(pos), W, H };
}

function remapEdges(pos) {
  const key = id => {
    const n = nodeById[id]; if (!n) return id;
    if (n.kind === "endpoint") return id;
    return collapsed.has(moduleName(n)) ? "mod:" + moduleName(n) : id;
  };
  const seen = new Set(), edges = [];
  for (const e of G.edges) {
    const a = key(e.from), b = key(e.to);
    if (a === b || !pos[a] || !pos[b]) continue;
    const k = a + "|" + b;
    if (!seen.has(k)) { seen.add(k); edges.push({ from: a, to: b, kind: e.kind, violation: e.violation }); }
  }
  return edges;
}

function recompute() {
  P = {};
  for (const id in Pbase) {
    const b = Pbase[id], lo = off(laneOffset, b.module), nd = off(nodeDelta, id);
    P[id] = { x: b.x + lo.dx + nd.dx, y: b.y + lo.dy + nd.dy, node: b.node, box: b.box, module: b.module };
  }
}

function applyTransforms() {
  for (const id in nodeEls) if (P[id]) nodeEls[id].setAttribute("transform", `translate(${P[id].x},${P[id].y})`);
  for (const m in laneEls) { const lo = off(laneOffset, m); laneEls[m].setAttribute("transform", `translate(${lo.dx},${lo.dy})`); }
  for (const p of edgeEls) {
    const a = P[p.from], b = P[p.to]; if (!a || !b) continue;
    p.line.setAttribute("d", edgeD(a, b));
    p.arr.setAttribute("points", arrowPts(a, b));
  }
}

// edgeGeom is side-aware with three modes:
//   fwd  — target in a column to the right: exit right, enter target's left.
//   back — target to the left (e.g. repo implementing a port): exit left,
//          enter target's right.
//   side — same column (e.g. handler -> event subscriber): both attach on the
//          right and the curve bulges out to the right, so it never crosses the
//          node bodies stacked in that column.
function edgeGeom(a, b) {
  const sameCol = Math.abs(a.x - b.x) < NODEW * 0.5;
  if (sameCol) {
    return { x1: a.x + NODEW, y1: a.y + NODEH / 2, x2: b.x + NODEW, y2: b.y + NODEH / 2, mode: "side" };
  }
  const forward = a.x < b.x;
  return {
    x1: forward ? a.x + NODEW : a.x,
    y1: a.y + NODEH / 2,
    x2: forward ? b.x : b.x + NODEW,
    y2: b.y + NODEH / 2,
    mode: forward ? "fwd" : "back",
  };
}
function edgeD(a, b) {
  const g = edgeGeom(a, b);
  if (g.mode === "side") {
    const k = 44 + Math.abs(g.y2 - g.y1) * 0.16;
    return `M ${g.x1} ${g.y1} C ${g.x1 + k} ${g.y1}, ${g.x2 + k} ${g.y2}, ${g.x2} ${g.y2}`;
  }
  const dx = g.x2 - g.x1;
  return `M ${g.x1} ${g.y1} C ${g.x1 + dx * 0.45} ${g.y1}, ${g.x2 - dx * 0.45} ${g.y2}, ${g.x2} ${g.y2}`;
}
function arrowPts(a, b) {
  const g = edgeGeom(a, b);
  // fwd enters the target's left (arrow points right); side/back enter the
  // target's right (arrow points left).
  const s = g.mode === "fwd" ? -11 : 11;
  return `${g.x2},${g.y2} ${g.x2 + s},${g.y2 - 6} ${g.x2 + s},${g.y2 + 6}`;
}

function render() {
  content.replaceChildren();
  nodeEls = {}; edgeEls = []; adj = {}; laneEls = {};
  const L = computeLayout();
  Pbase = L.pos; lastSize = { W: L.W, H: L.H };

  // defs: per-layer gradients + glow filter
  const defs = el("defs");
  for (const layer in COLOR) {
    const c = COLOR[layer];
    const grad = el("linearGradient", { id: `grad-${layer}`, x1: 0, y1: 0, x2: 0, y2: 1 });
    grad.appendChild(el("stop", { offset: "0%", "stop-color": c, "stop-opacity": 0.15 }));
    grad.appendChild(el("stop", { offset: "100%", "stop-color": c, "stop-opacity": 0.035 }));
    defs.appendChild(grad);
  }
  const grid = el("pattern", { id: "grid", width: 26, height: 26, patternUnits: "userSpaceOnUse" });
  grid.appendChild(el("circle", { cx: 1, cy: 1, r: 1, fill: "#ffffff0a" }));
  defs.appendChild(grid);
  content.appendChild(defs);
  content.appendChild(el("rect", { x: -4000, y: -4000, width: L.W + 8000, height: L.H + 8000, fill: "url(#grid)" }));

  // lanes
  const laneLayer = el("g"); content.appendChild(laneLayer);
  L.lanes.forEach((lane) => {
    const g = el("g", { class: "lane", "data-module": lane.module });
    const lx = lane.x != null ? lane.x : LEFT - 12;
    g.appendChild(el("rect", { class: "lane-bg", x: lx, y: lane.y, width: lane.w || (L.W - LEFT - 4), height: lane.h, rx: 18 }));
    g.appendChild(el("text", { class: "grip", x: lx + 12, y: lane.y + 26 }, [txt("⠿")]));
    g.appendChild(el("text", { class: "tri", x: lx + 28, y: lane.y + 25 }, [txt(lane.collapsed ? "▶" : "▼")]));
    g.appendChild(el("text", { class: "lname", x: lx + 42, y: lane.y + 27 }, [txt(lane.module)]));
    g.appendChild(el("text", { class: "cnt", x: lx + 42 + lane.module.length * 8 + 12, y: lane.y + 27 },
      [txt(`${lane.count} fn${lane.collapsed ? " · collapsed" : ""}`)]));
    attachLaneDrag(g, lane.module);
    laneEls[lane.module] = g;
    laneLayer.appendChild(g);
  });

  // edges (under nodes)
  const edgeLayer = el("g"); content.appendChild(edgeLayer);
  const addAdj = (a, b) => { (adj[a] = adj[a] || new Set()).add(b); (adj[b] = adj[b] || new Set()).add(a); };
  for (const e of L.edges) {
    const srcLayer = (nodeById[e.from] || {}).layer || "controller";
    const isImpl = e.kind === "implements";
    const isDisp = e.kind === "dispatch";
    const isRpc = e.kind === "rpc";
    const viol = e.violation;
    const color = viol ? "#F87171" : isRpc ? "#34D399" : isImpl ? COLOR.port : isDisp ? "#FBBF24" : (COLOR[srcLayer] || COLOR.other);
    const dashed = isImpl || isDisp || isRpc || srcLayer === "endpoint";
    const line = el("path", { class: "edge", stroke: color,
      "stroke-width": viol ? 2.4 : isRpc ? 2.2 : 1.6, "stroke-opacity": viol ? 0.95 : isRpc ? 0.85 : 0.4,
      "stroke-dasharray": dashed ? (isRpc ? "2 5" : "7 6") : "0", "stroke-linecap": "round" });
    const arr = el("polygon", { class: "arrow", fill: color, "fill-opacity": viol ? 0.95 : isRpc ? 0.9 : 0.55 });
    edgeLayer.appendChild(line); edgeLayer.appendChild(arr);
    edgeEls.push({ from: e.from, to: e.to, line, arr, color, violation: viol });
    addAdj(e.from, e.to);
  }

  // nodes
  const nodeLayer = el("g"); content.appendChild(nodeLayer);
  for (const id in Pbase) nodeLayer.appendChild(buildNode(id, Pbase[id]));

  recompute(); applyTransforms();
  if (!viewInit) { fitView(); viewInit = true; }
}

function buildNode(id, b) {
  const g1 = el("g", { class: b.box ? "node modbox" : "node" });
  if (b.box) {
    g1.appendChild(el("rect", { class: "card", width: NODEW, height: NODEH, rx: 14,
      fill: "#0c1320", stroke: "#ffffff20", "stroke-dasharray": "5 4" }));
    g1.appendChild(el("text", { class: "ident", x: 18, y: 34 }, [txt("▶ " + b.box.module)]));
    g1.appendChild(el("text", { class: "sub", x: 18, y: 56 }, [txt(`${b.box.count} fn collapsed · click to expand`)]));
    wire(g1, id);
    return g1;
  }
  const n = b.node, color = COLOR[n.layer] || COLOR.other;

  // Port (interface seam): dashed steel card, «interface» tag, no glow dot.
  if (n.kind === "port") {
    g1.appendChild(el("rect", { class: "card", width: NODEW, height: NODEH, rx: 14,
      fill: rgba(color, 0.06), stroke: rgba(color, 0.6), "stroke-dasharray": "6 4" }));
    g1.appendChild(el("circle", { cx: NODEW - 18, cy: 18, r: 4.5, fill: "none", stroke: color, "stroke-width": 1.5 }));
    g1.appendChild(el("text", { class: "ptag", x: 18, y: 28 }, [txt("◇ interface")]));
    const label = n.label.length > 30 ? n.label.slice(0, 29) + "…" : n.label;
    g1.appendChild(el("text", { class: "ident", x: 18, y: 56 }, [txt(label)]));
    wire(g1, id);
    return g1;
  }

  g1.appendChild(el("rect", { class: "card", width: NODEW, height: NODEH, rx: 14,
    fill: `url(#grad-${n.layer})`, stroke: rgba(color, 0.42) }));
  // glow dot top-right
  const dot = el("circle", { class: "glowdot", cx: NODEW - 18, cy: 18, r: 4.5, fill: color });
  dot.setAttribute("style", `filter: drop-shadow(0 0 6px ${rgba(color, 0.9)})`);
  g1.appendChild(dot);

  if (n.kind === "endpoint") {
    const m = n.method || "ANY", mc = methodColor(m), bw = 16 + m.length * 7.2;
    g1.appendChild(el("rect", { x: 18, y: 16, width: bw, height: 20, rx: 6,
      fill: rgba(mc, 0.13), stroke: rgba(mc, 0.4) }));
    g1.appendChild(el("text", { class: "mtxt", x: 18 + bw / 2, y: 30, "text-anchor": "middle", fill: mc }, [txt(m)]));
    const route = n.path || "(dynamic)";
    g1.appendChild(el("text", { class: "route", x: 18, y: 62 },
      [txt(route.length > 30 ? route.slice(0, 29) + "…" : route)]));
  } else {
    const label = n.label.length > 34 ? n.label.slice(0, 33) + "…" : n.label;
    g1.appendChild(el("text", { class: "ident", x: 18, y: 38 }, [txt(label)]));
    const sub = (n.module ? n.module + "  ·  " : "") + shortPkg(n.pkg);
    g1.appendChild(el("text", { class: "sub", x: 18, y: 60 }, [txt(sub)]));
  }
  wire(g1, id);
  return g1;
}

function wire(g1, id) {
  g1.addEventListener("mouseenter", () => highlight(id));
  g1.addEventListener("mouseleave", clearHi);
  attachDrag(g1, id);
  nodeEls[id] = g1;
}

function toggle(m) { collapsed.has(m) ? collapsed.delete(m) : collapsed.add(m); saveLayout(); render(); }

// --- layout persistence (localStorage, keyed per graph) ---
function storageKey() { return "archview:layout:" + BASE + ":" + ((G && G.module) || ""); }
function saveLayout() {
  try {
    localStorage.setItem(storageKey(), JSON.stringify({
      nodeDelta, laneOffset, collapsed: [...collapsed],
    }));
  } catch (e) { /* storage unavailable */ }
}
function loadLayout() {
  try {
    const raw = localStorage.getItem(storageKey());
    if (!raw) return;
    const s = JSON.parse(raw);
    Object.assign(nodeDelta, s.nodeDelta || {});
    Object.assign(laneOffset, s.laneOffset || {});
    (s.collapsed || []).forEach(m => collapsed.add(m));
  } catch (e) { /* ignore */ }
}
function resetLayout() {
  for (const k in nodeDelta) delete nodeDelta[k];
  for (const k in laneOffset) delete laneOffset[k];
  collapsed.clear();
  try { localStorage.removeItem(storageKey()); } catch (e) {}
  render(); fitView();
}

function attachDrag(g1, id) {
  g1.addEventListener("mousedown", e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    const start = clientToSvg(e.clientX, e.clientY), base = { ...off(nodeDelta, id) };
    let moved = false;
    g1.classList.add("dragging");
    const onMove = ev => {
      const c = clientToSvg(ev.clientX, ev.clientY), dx = c.x - start.x, dy = c.y - start.y;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
      nodeDelta[id] = { dx: base.dx + dx, dy: base.dy + dy };
      recompute(); applyTransforms();
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp);
      g1.classList.remove("dragging");
      if (!moved) onClick(id); else saveLayout();
    };
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
  });
}

function attachLaneDrag(g, module) {
  g.addEventListener("mousedown", e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    const start = clientToSvg(e.clientX, e.clientY), base = { ...off(laneOffset, module) };
    let moved = false;
    g.classList.add("dragging");
    const onMove = ev => {
      const c = clientToSvg(ev.clientX, ev.clientY), dx = c.x - start.x, dy = c.y - start.y;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
      laneOffset[module] = { dx: base.dx + dx, dy: base.dy + dy };
      recompute(); applyTransforms();
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp);
      g.classList.remove("dragging");
      if (!moved) toggle(module); else saveLayout();
    };
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
  });
}

function onClick(id) {
  const p = P[id];
  if (p.box) { collapsed.delete(p.box.module); render(); return; }
  if (p.node && p.node.editorURL) window.location.href = p.node.editorURL;
}

function highlight(id) {
  const keep = new Set([id, ...(adj[id] || [])]);
  for (const k in nodeEls) nodeEls[k].classList.toggle("dim", !keep.has(k));
  for (const p of edgeEls) {
    const on = p.from === id || p.to === id;
    p.line.setAttribute("stroke-opacity", on ? 0.95 : 0.06);
    p.line.setAttribute("stroke-width", on ? 2.4 : 1.1);
    p.arr.setAttribute("fill-opacity", on ? 0.95 : 0.06);
  }
  const p = P[id];
  const left = document.getElementById("s-left"), mid = document.getElementById("s-mid"), loc = document.getElementById("s-loc");
  if (p.box) { left.textContent = p.box.module; mid.textContent = `${p.box.count} functions collapsed`; loc.textContent = "click to expand"; return; }
  const n = p.node;
  if (n.kind === "endpoint") { left.textContent = `${n.method} ${n.path || "(dynamic)"}`; mid.textContent = n.module || ""; loc.textContent = ""; }
  else { left.textContent = n.label; mid.textContent = n.pkg || ""; loc.textContent = n.file ? short(n.file) + ":" + n.line : ""; }
}
function clearHi() {
  for (const k in nodeEls) nodeEls[k].classList.remove("dim");
  for (const p of edgeEls) {
    p.line.setAttribute("stroke-opacity", 0.4);
    p.line.setAttribute("stroke-width", 1.6);
    p.arr.setAttribute("fill-opacity", 0.55);
  }
}

function applyView() { svg.setAttribute("viewBox", `${view.x} ${view.y} ${view.w} ${view.h}`); }
function clientToSvg(cx, cy) {
  const r = svg.getBoundingClientRect();
  return { x: view.x + (cx - r.left) / r.width * view.w, y: view.y + (cy - r.top) / r.height * view.h };
}
function fitView() {
  const pad = 40, aspect = mainEl.clientWidth / mainEl.clientHeight || 1.4;
  let w = lastSize.W + pad * 2, h = lastSize.H + pad * 2;
  if (w / h > aspect) h = w / aspect; else w = h * aspect;
  view = { x: -pad - (w - (lastSize.W + pad * 2)) / 2, y: -pad - (h - (lastSize.H + pad * 2)) / 2, w, h };
  applyView();
}
function zoomBy(k) {
  const cx = view.x + view.w / 2, cy = view.y + view.h / 2;
  view.x = cx - (cx - view.x) * k; view.y = cy - (cy - view.y) * k;
  view.w *= k; view.h *= k; applyView();
}

function setupControls() {
  let drag = null;
  mainEl.addEventListener("mousedown", e => {
    if (e.target.closest(".node, .lane, .toolbar")) return;
    drag = { x: e.clientX, y: e.clientY, vx: view.x, vy: view.y }; mainEl.classList.add("panning");
  });
  window.addEventListener("mousemove", e => {
    if (!drag) return;
    const k = view.w / mainEl.clientWidth;
    view.x = drag.vx - (e.clientX - drag.x) * k; view.y = drag.vy - (e.clientY - drag.y) * k; applyView();
  });
  window.addEventListener("mouseup", () => { drag = null; mainEl.classList.remove("panning"); });
  mainEl.addEventListener("wheel", e => {
    e.preventDefault();
    const k = e.deltaY > 0 ? 1.1 : 0.9, m = clientToSvg(e.clientX, e.clientY);
    view.x = m.x - (m.x - view.x) * k; view.y = m.y - (m.y - view.y) * k;
    view.w *= k; view.h *= k; applyView();
  }, { passive: false });
  document.getElementById("toolbar").addEventListener("click", e => {
    const act = e.target.dataset.act; if (!act) return;
    if (act === "fit") fitView();
    else if (act === "reset") resetLayout();
    else if (act === "expand") { collapsed.clear(); saveLayout(); render(); fitView(); }
    else if (act === "collapse") { modulesAll.forEach(m => collapsed.add(m)); saveLayout(); render(); fitView(); }
    else if (act === "zoomin") zoomBy(0.83);
    else if (act === "zoomout") zoomBy(1.2);
  });
}

main().catch(err => { document.getElementById("s-mid").textContent = "error: " + err; });
</script>
</body>
</html>
